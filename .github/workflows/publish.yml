name: Publish to crates.io

on:
  workflow_run:
    workflows: [Release]
    types: [completed]

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Publish bazel-cache-proxy-core
        run: cargo publish -p bazel-cache-proxy-core --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io propagation
        run: sleep 30

      - name: Publish bazel-cache-proxy-disk
        run: cargo publish -p bazel-cache-proxy-disk --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish bazel-cache-proxy-s3
        run: cargo publish -p bazel-cache-proxy-s3 --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish bazel-cache-proxy-gcs
        run: cargo publish -p bazel-cache-proxy-gcs --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish bazel-cache-proxy-gha
        run: cargo publish -p bazel-cache-proxy-gha --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io propagation
        run: sleep 30

      - name: Publish bazel-cache-proxy (binary)
        run: cargo publish -p bazel-cache-proxy --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
